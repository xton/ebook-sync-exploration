name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  functional-tests:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    # Optional — time-boxed; don't block merges if infra is flaky
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:functional
        timeout-minutes: 10
